<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SWG Galaxy Map Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="swg-window">
    <div class="swg-window-inner">
      <div class="swg-window-title">Ticket Purchase - Galaxy Map</div>

      <div id="mapFrame">
        <!-- WebGL DDS background -->
        <canvas id="ddsCanvas" width="501" height="486"></canvas>
        <!-- 2D planets overlay -->
        <canvas id="mapCanvas" width="501" height="486"></canvas>
      </div>

      <div class="controls">
        <input type="file" id="fileInput" />
        <input type="text" id="backgroundPathInput" placeholder="assets/ui_rebel_starfield.dds" />
        <button id="applyBackgroundBtn">Apply Background</button>
        <button id="parseBtn">Parse</button>
        <button id="exportBtn">Export</button>
        <button id="copyBtn">Copy XML</button>
        <button id="loadPlanetImgBtn">Load Planet Images</button>
        <button id="addPlanetBtn">Add Planet</button>
        <input type="file" id="planetImgInput" accept="image/*" multiple style="display:none" />
      </div>

      <!-- Add Planet Modal -->
      <div id="addPlanetModal" class="modal-overlay" style="display:none">
        <div class="modal-box">
          <div class="modal-title">Add New Planet</div>
          <div class="modal-row">
            <label>Display Name</label>
            <input type="text" id="ap-displayName" placeholder="e.g. Geonosis" />
          </div>
          <div class="modal-row">
            <label>Internal Key</label>
            <input type="text" id="ap-key" placeholder="auto-filled" />
          </div>
          <div class="modal-row">
            <label>Appearance Template</label>
            <input type="text" id="ap-apt" placeholder="appearance/ui_planet_sel_XXXX.apt" />
          </div>
          <div class="modal-row">
            <label>Size</label>
            <span class="modal-radio-group">
              <label><input type="radio" name="ap-size" value="large" checked /> Large</label>
              <label><input type="radio" name="ap-size" value="small" /> Small</label>
            </span>
          </div>
          <div class="modal-actions">
            <button id="ap-cancelBtn">Cancel</button>
            <button id="ap-confirmBtn">Add Planet</button>
          </div>
        </div>
      </div>

      <textarea id="output" rows="12" spellcheck="false" placeholder="Export output will appear here..."></textarea>

      <div class="tables">
        <div class="table-block">
          <h3>Planets</h3>
          <table id="planetTable">
            <thead>
              <tr><th>Name</th><th>X</th><th>Y</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="table-block">
          <h3>Buttons</h3>
          <table id="buttonTable">
            <thead>
              <tr><th>Button</th><th>Planet</th><th>X</th><th>Y</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="table-block">
          <h3>DataSources</h3>
          <table id="dataSourceTable">
            <thead>
              <tr><th>Planet</th><th>Appearance</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

<script src="ddsImage.js"></script>
<script src="ddsLoader.js"></script>
<script src="ddsBackground.js"></script>
<script src="load.js"></script>

</body>
</html>
